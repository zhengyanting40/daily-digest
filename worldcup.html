*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;padding:16px;max-width:680px;margin:0 auto}
h1{font-size:22px;color:#f0f6fc;text-align:center;padding:16px 0 4px}

.date-bar{text-align:center;color:#8b949e;font-size:14px;margin-bottom:16px;padding:8px;background:#161b22;border-radius:8px;border:1px solid #30363d}
.gr{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px;overflow:hidden}
.gr-title{font-size:15px;font-weight:600;padding:10px 14px;background:#1c2128;color:#f0f6fc;border-bottom:1px solid #30363d}
.gr-body{padding:10px 14px}
.team{display:grid;grid-template-columns:24px 1fr 30px 30px 30px 30px 30px 30px 40px;gap:4px;padding:5px 0;font-size:14px;border-bottom:1px solid #21262d;align-items:center}
.team:last-child{border-bottom:none}
.team .pos{color:#8b949e;text-align:center;font-size:13px}
.team .name{font-weight:500}
.team .name .flag{margin-right:4px}
.team .stat{text-align:center;color:#c9d1d9}
.team .pts{text-align:center;font-weight:700;color:#f0f6fc}
.team.top{background:linear-gradient(90deg,rgba(248,81,73,0.08),transparent)}
.team.top .pts{color:#F85149}
.header-row{display:grid;grid-template-columns:24px 1fr 30px 30px 30px 30px 30px 30px 40px;gap:4px;padding:4px 0;font-size:11px;color:#8b949e;text-align:center;border-bottom:1px solid #30363d}
.header-row .col-name{text-align:left}
.ft{text-align:center;color:#484f58;padding:20px;font-size:12px}
.ft a{color:#58a6ff;text-decoration:none}
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding:4px 0}
.tab{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 12px;font-size:13px;color:#c9d1d9;cursor:pointer;white-space:nowrap}
.tab.active{background:#F85149;border-color:#F85149;color:#fff}
.tab:hover{background:#30363d}
.match-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.match-info{flex:1}
.match-teams{font-size:15px;font-weight:600;color:#f0f6fc;margin-bottom:4px}
.match-teams .vs{color:#8b949e;margin:0 8px}
.match-score{font-size:24px;font-weight:700;text-align:center;min-width:70px}
.match-score.live{color:#F85149}
.match-score.final{color:#f0f6fc}
.match-date{font-size:12px;color:#8b949e}
.match-venue{font-size:11px;color:#484f58}
</style>
</head>

// Render
// ═══════════════════════════════════════════════

function renderGroups() {
  const el = document.getElementById('groups-view');
  el.innerHTML = GROUPS.map(g => {
    const rows = g.teams.map((t, i) => {
      const top = i < 2 ? 'top' : '';
      return `<div class="team ${top}">
        <div class="pos">${i+1}</div>
        <div class="name">${t.flag} ${t.name}</div>
        <div class="stat">${t.pld}</div>
        <div class="stat">${t.w}</div>
        <div class="stat">${t.d}</div>
        <div class="stat">${t.l}</div>
        <div class="stat">${t.gf}</div>
        <div class="stat">${t.ga}</div>
        <div class="pts">${t.pts}</div>
      </div>`;
    }).join('');
    return `<div class="gr">
      <div class="gr-title">${g.flag} ${g.name}组</div>
      <div class="gr-body">
        <div class="header-row">
          <div></div>
          <div class="col-name">球队</div>
          <div>赛</div><div>胜</div><div>平</div><div>负</div><div>进</div><div>失</div><div>分</div>
        </div>
        ${rows}
      </div>
    </div>`;
  }).join('');
}

function renderMatches() {
  const el = document.getElementById('matches-view');
  el.innerHTML = '<div style="color:#8b949e;text-align:center;padding:40px;font-size:14px;">⚔️ 赛程数据整理中…<br><br>小组成员赛数据已展示在积分榜中。<br>每个小组当前已进行部分比赛，完整赛程将陆续更新。</div>';
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById('groups-view').style.display = name === 'groups' ? '' : 'none';
  document.getElementById('matches-view').style.display = name === 'matches' ? '' : 'none';
}
